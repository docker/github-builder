name: .test-build

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'releases/v*'
    paths:
      - '.github/workflows/.test-build.yml'
      - '.github/workflows/build.yml'
      - '.github/workflows/verify.yml'
      - 'test/**'
  pull_request:
    paths:
      - '.github/workflows/.test-build.yml'
      - '.github/workflows/build.yml'
      - '.github/workflows/verify.yml'
      - 'test/**'

jobs:
  build-dockerhub-single:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      job-name-prefix: build-dockerhub-single
      build-args: |
        VERSION={{meta.version}}
      cache: true
      cache-scope: build-dockerhub-single
      file: test/hello.Dockerfile
      output: image
      push: ${{ github.event_name != 'pull_request' }}
      sbom: true
      meta-images: |
        docker.io/dockereng/github-builder-test
      meta-tags: |
        type=raw,value=build-ghbuilder-single-${{ github.run_id }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ vars.DOCKERPUBLICBOT_USERNAME }}
          password: ${{ secrets.DOCKERPUBLICBOT_WRITE_PAT }}

  build-dockerhub-single-verify:
    uses: ./.github/workflows/verify.yml
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-dockerhub-single
    with:
      builder-outputs: ${{ toJSON(needs.build-dockerhub-single.outputs) }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ vars.DOCKERPUBLICBOT_USERNAME }}
          password: ${{ secrets.DOCKERPUBLICBOT_WRITE_PAT }}

  build-dockerhub-single-outputs:
    runs-on: ubuntu-24.04
    needs:
      - build-dockerhub-single
    steps:
      -
        name: Builder outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BUILDER-OUTPUTS: ${{ toJSON(needs.build-dockerhub-single.outputs) }}
        with:
          script: |
            const builderOutputs = JSON.parse(core.getInput('builder-outputs'));
            core.info(JSON.stringify(builderOutputs, null, 2));

  build-dockerhub:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      build-args: |
        VERSION={{meta.version}}
      cache: true
      cache-scope: build-dockerhub
      file: test/hello.Dockerfile
      output: image
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name != 'pull_request' }}
      runner: |
        default=ubuntu-24.04
        linux/arm=ubuntu-24.04-arm
        linux/arm64=ubuntu-24.04-arm
      sbom: true
      meta-images: |
        docker.io/dockereng/github-builder-test
      meta-tags: |
        type=raw,value=build-ghbuilder-${{ github.run_id }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ vars.DOCKERPUBLICBOT_USERNAME }}
          password: ${{ secrets.DOCKERPUBLICBOT_WRITE_PAT }}

  build-dockerhub-verify:
    uses: ./.github/workflows/verify.yml
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-dockerhub
    with:
      builder-outputs: ${{ toJSON(needs.build-dockerhub.outputs) }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ vars.DOCKERPUBLICBOT_USERNAME }}
          password: ${{ secrets.DOCKERPUBLICBOT_WRITE_PAT }}

  build-dockerhub-outputs:
    runs-on: ubuntu-24.04
    needs:
      - build-dockerhub
    steps:
      -
        name: Builder outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BUILDER-OUTPUTS: ${{ toJSON(needs.build-dockerhub.outputs) }}
        with:
          script: |
            const builderOutputs = JSON.parse(core.getInput('builder-outputs'));
            core.info(JSON.stringify(builderOutputs, null, 2));

  build-dockerhub-scan:
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-dockerhub
    steps:
      -
        name: Scan for vulnerabilities
        uses: crazy-max/ghaction-container-scan@ffcba8deb5cb3531954cbedbbcd0179d79edf510 # v4.1.0
        with:
          image: docker.io/dockereng/github-builder-test@${{ needs.build-dockerhub.outputs.digest }}

  build-dockerhub-nosign:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      build-args: |
        VERSION={{meta.version}}
      cache: true
      cache-scope: build-dockerhub-nosign
      file: test/hello.Dockerfile
      output: image
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name != 'pull_request' }}
      sbom: true
      sign: false
      meta-images: |
        docker.io/dockereng/github-builder-test
      meta-tags: |
        type=raw,value=build-ghbuilder-nosign--${{ github.run_id }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ vars.DOCKERPUBLICBOT_USERNAME }}
          password: ${{ secrets.DOCKERPUBLICBOT_WRITE_PAT }}

  build-dockerhub-nosign-verify:
    uses: ./.github/workflows/verify.yml
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-dockerhub-nosign
    with:
      builder-outputs: ${{ toJSON(needs.build-dockerhub-nosign.outputs) }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ vars.DOCKERPUBLICBOT_USERNAME }}
          password: ${{ secrets.DOCKERPUBLICBOT_WRITE_PAT }}

  build-dockerhub-nosign-outputs:
    runs-on: ubuntu-24.04
    needs:
      - build-dockerhub-nosign
    steps:
      -
        name: Builder outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BUILDER-OUTPUTS: ${{ toJSON(needs.build-dockerhub-nosign.outputs) }}
        with:
          script: |
            const builderOutputs = JSON.parse(core.getInput('builder-outputs'));
            core.info(JSON.stringify(builderOutputs, null, 2));

  build-ghcr:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      build-args: |
        VERSION={{meta.version}}
      file: test/hello.Dockerfile
      output: image
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name != 'pull_request' }}
      sbom: true
      meta-images: ghcr.io/docker/github-builder-test
      meta-tags: |
        type=raw,value=build-${{ github.run_id }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  build-ghcr-verify:
    uses: ./.github/workflows/verify.yml
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-ghcr
    with:
      builder-outputs: ${{ toJSON(needs.build-ghcr.outputs) }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  build-ghcr-outputs:
    runs-on: ubuntu-24.04
    needs:
      - build-ghcr
    steps:
      -
        name: Builder outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BUILDER-OUTPUTS: ${{ toJSON(needs.build-ghcr.outputs) }}
        with:
          script: |
            const builderOutputs = JSON.parse(core.getInput('builder-outputs'));
            core.info(JSON.stringify(builderOutputs, null, 2));

  build-ghcr-and-dockerhub:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      build-args: |
        VERSION={{meta.version}}
      file: test/hello.Dockerfile
      output: image
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name != 'pull_request' }}
      sbom: true
      meta-images: |
        ghcr.io/docker/github-builder-test
        docker.io/dockereng/github-builder-test
      meta-tags: |
        type=raw,value=${{ github.run_id }},prefix=build-ghcr-and-dockerhub-
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        - registry: docker.io
          username: ${{ vars.DOCKERPUBLICBOT_USERNAME }}
          password: ${{ secrets.DOCKERPUBLICBOT_WRITE_PAT }}

  build-ghcr-and-dockerhub-verify:
    uses: ./.github/workflows/verify.yml
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-ghcr-and-dockerhub
    with:
      builder-outputs: ${{ toJSON(needs.build-ghcr-and-dockerhub.outputs) }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        - registry: docker.io
          username: ${{ vars.DOCKERPUBLICBOT_USERNAME }}
          password: ${{ secrets.DOCKERPUBLICBOT_WRITE_PAT }}

  build-ghcr-and-dockerhub-outputs:
    runs-on: ubuntu-24.04
    needs:
      - build-ghcr-and-dockerhub
    steps:
      -
        name: Builder outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BUILDER-OUTPUTS: ${{ toJSON(needs.build-ghcr-and-dockerhub.outputs) }}
        with:
          script: |
            const builderOutputs = JSON.parse(core.getInput('builder-outputs'));
            core.info(JSON.stringify(builderOutputs, null, 2));

  build-local:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      artifact-name: build-output
      artifact-upload: true
      file: test/hello.Dockerfile
      output: local
      platforms: linux/amd64,linux/arm64
      sbom: true
      sign: ${{ github.event_name != 'pull_request' }}

  build-local-verify:
    uses: ./.github/workflows/verify.yml
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-local
    with:
      builder-outputs: ${{ toJSON(needs.build-local.outputs) }}

  build-local-outputs:
    runs-on: ubuntu-24.04
    needs:
      - build-local
    steps:
      -
        name: Builder outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BUILDER-OUTPUTS: ${{ toJSON(needs.local.outputs) }}
        with:
          script: |
            const builderOutputs = JSON.parse(core.getInput('builder-outputs'));
            core.info(JSON.stringify(builderOutputs, null, 2));

  build-local-single:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      artifact-name: build-single-output
      artifact-upload: true
      file: test/hello.Dockerfile
      output: local
      sbom: true
      sign: ${{ github.event_name != 'pull_request' }}

  build-local-single-verify:
    uses: ./.github/workflows/verify.yml
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-local-single
    with:
      builder-outputs: ${{ toJSON(needs.build-local-single.outputs) }}

  build-local-single-outputs:
    runs-on: ubuntu-24.04
    needs:
      - build-local-single
    steps:
      -
        name: Builder outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BUILDER-OUTPUTS: ${{ toJSON(needs.build-local-single.outputs) }}
        with:
          script: |
            const builderOutputs = JSON.parse(core.getInput('builder-outputs'));
            core.info(JSON.stringify(builderOutputs, null, 2));

  build-local-noupload:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      artifact-upload: false
      file: test/hello.Dockerfile
      output: local
      platforms: linux/amd64,linux/arm64
      sbom: true

  build-local-noupload-verify:
    uses: ./.github/workflows/verify.yml
    needs:
      - build-local-noupload
    with:
      builder-outputs: ${{ toJSON(needs.build-local-noupload.outputs) }}

  build-local-noupload-outputs:
    runs-on: ubuntu-24.04
    needs:
      - build-local-noupload
    steps:
      -
        name: Builder outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BUILDER-OUTPUTS: ${{ toJSON(needs.build-local-noupload.outputs) }}
        with:
          script: |
            const builderOutputs = JSON.parse(core.getInput('builder-outputs'));
            core.info(JSON.stringify(builderOutputs, null, 2));

  build-local-nosign:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      artifact-name: build-nosign-output
      artifact-upload: true
      file: test/hello.Dockerfile
      output: local
      platforms: linux/amd64,linux/arm64
      sbom: true
      sign: false

  build-local-nosign-verify:
    uses: ./.github/workflows/verify.yml
    needs:
      - build-local-nosign
    with:
      builder-outputs: ${{ toJSON(needs.build-local-nosign.outputs) }}

  build-local-nosign-outputs:
    runs-on: ubuntu-24.04
    needs:
      - build-local-nosign
    steps:
      -
        name: Builder outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BUILDER-OUTPUTS: ${{ toJSON(needs.build-local-nosign.outputs) }}
        with:
          script: |
            const builderOutputs = JSON.parse(core.getInput('builder-outputs'));
            core.info(JSON.stringify(builderOutputs, null, 2));

  build-set-runner:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      runner: ubuntu-24.04
      build-args: |
        VERSION={{meta.version}}
      file: test/hello.Dockerfile
      output: image
      platforms: linux/amd64,linux/arm64
      push: false
      meta-images: ghcr.io/docker/github-builder-test
      meta-tags: |
        type=raw,value=build-${{ github.run_id }}

  build-set-runner-deprecated:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      runner: amd64
      build-args: |
        VERSION={{meta.version}}
      file: test/hello.Dockerfile
      output: image
      platforms: linux/amd64,linux/arm64
      push: false
      meta-images: ghcr.io/docker/github-builder-test
      meta-tags: |
        type=raw,value=build-${{ github.run_id }}

  build-qemu:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      setup-qemu: true
      artifact-upload: false
      file: test/hello.Dockerfile
      output: local
      platforms: linux/amd64,linux/arm64
      sbom: true

  build-dockerhub-nodistrib:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      distribute: false
      build-args: |
        VERSION={{meta.version}}
      cache: true
      cache-scope: build-dockerhub-nodistrib
      file: test/hello.Dockerfile
      output: image
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name != 'pull_request' }}
      sbom: true
      meta-images: |
        docker.io/dockereng/github-builder-test
      meta-tags: |
        type=raw,value=build-ghbuilder-nodistrib-${{ github.run_id }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ vars.DOCKERPUBLICBOT_USERNAME }}
          password: ${{ secrets.DOCKERPUBLICBOT_WRITE_PAT }}

  build-local-nodistrib:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      distribute: false
      artifact-name: build-nodistrib-output
      artifact-upload: true
      file: test/hello.Dockerfile
      output: local
      platforms: linux/amd64,linux/arm64
      sbom: true
      sign: ${{ github.event_name != 'pull_request' }}

  build-auth-scope:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      build-args: |
        VERSION={{meta.version}}
      file: test/hello.Dockerfile
      output: image
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name != 'pull_request' }}
      sbom: true
      meta-images: ghcr.io/docker/github-builder-test
      meta-tags: |
        type=raw,value=build-scope-${{ github.run_id }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          scope: '@push'

  build-auth-scope-verify:
    uses: ./.github/workflows/verify.yml
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-auth-scope
    with:
      builder-outputs: ${{ toJSON(needs.build-auth-scope.outputs) }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  build-ghcr-index-annotations:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      annotations: |
        io.github.docker.github-builder.test-index-annotation=build-${{ github.run_id }}
      build-args: |
        VERSION={{meta.version}}
      file: test/hello.Dockerfile
      output: image
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name != 'pull_request' }}
      sbom: true
      set-meta-annotations: true
      meta-images: ghcr.io/docker/github-builder-test
      meta-tags: |
        type=raw,value=build-index-annotations-${{ github.run_id }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  build-ghcr-image-casing:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      build-args: |
        VERSION={{meta.version}}
      file: test/hello.Dockerfile
      output: image
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name != 'pull_request' }}
      sbom: true
      set-meta-annotations: true
      meta-images: ghcr.io/docker/GitHub-Builder-Test
      meta-tags: |
        type=raw,value=build-image-casing-${{ github.run_id }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
